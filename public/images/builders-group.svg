<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" width="360" height="200">
  <!-- 3 Builder characters - Crazy Arcade style -->

  <!-- Character 1 - Blue (Hacker) -->
  <g transform="translate(60, 20)">
    <rect x="15" y="70" width="50" height="40" rx="10" fill="#4A90FF" stroke="#222" stroke-width="3"/>
    <circle cx="40" cy="48" r="28" fill="#FFE0B2" stroke="#222" stroke-width="3"/>
    <rect x="12" y="30" width="56" height="14" rx="4" fill="#333" stroke="#222" stroke-width="2.5"/>
    <rect x="16" y="36" width="48" height="8" rx="2" fill="#60A5FA" opacity="0.5"/>
    <ellipse cx="30" cy="50" rx="4.5" ry="5" fill="#222"/>
    <ellipse cx="50" cy="50" rx="4.5" ry="5" fill="#222"/>
    <circle cx="29" cy="48" r="2" fill="#FFF"/>
    <circle cx="49" cy="48" r="2" fill="#FFF"/>
    <path d="M33 62 Q40 68 47 62" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="22" cy="58" rx="5" ry="3" fill="#FFB4B4" opacity="0.5"/>
    <ellipse cx="58" cy="58" rx="5" ry="3" fill="#FFB4B4" opacity="0.5"/>
    <rect x="20" y="108" width="16" height="24" rx="6" fill="#1A1A2E" stroke="#222" stroke-width="2.5"/>
    <rect x="44" y="108" width="16" height="24" rx="6" fill="#1A1A2E" stroke="#222" stroke-width="2.5"/>
    <rect x="16" y="128" width="24" height="12" rx="6" fill="#4ADE80" stroke="#222" stroke-width="2.5"/>
    <rect x="40" y="128" width="24" height="12" rx="6" fill="#4ADE80" stroke="#222" stroke-width="2.5"/>
  </g>

  <!-- Character 2 - Orange (Leader, taller) -->
  <g transform="translate(150, 10)">
    <rect x="12" y="72" width="56" height="44" rx="10" fill="#FF4D00" stroke="#222" stroke-width="3"/>
    <circle cx="40" cy="46" r="32" fill="#FFE0B2" stroke="#222" stroke-width="3"/>
    <path d="M8 38 Q8 14 40 10 Q72 14 72 38 L72 30 Q72 8 40 4 Q8 8 8 30Z" fill="#222" stroke="#222" stroke-width="2.5"/>
    <ellipse cx="28" cy="48" rx="5" ry="6" fill="#222"/>
    <ellipse cx="52" cy="48" rx="5" ry="6" fill="#222"/>
    <circle cx="27" cy="46" r="2.5" fill="#FFF"/>
    <circle cx="51" cy="46" r="2.5" fill="#FFF"/>
    <path d="M32 62 Q40 70 48 62" fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>
    <ellipse cx="18" cy="56" rx="6" ry="3.5" fill="#FFB4B4" opacity="0.5"/>
    <ellipse cx="62" cy="56" rx="6" ry="3.5" fill="#FFB4B4" opacity="0.5"/>
    <rect x="18" y="114" width="18" height="28" rx="7" fill="#333" stroke="#222" stroke-width="2.5"/>
    <rect x="44" y="114" width="18" height="28" rx="7" fill="#333" stroke="#222" stroke-width="2.5"/>
    <rect x="14" y="138" width="26" height="12" rx="6" fill="#FFD700" stroke="#222" stroke-width="2.5"/>
    <rect x="40" y="138" width="26" height="12" rx="6" fill="#FFD700" stroke="#222" stroke-width="2.5"/>
    <!-- Crown -->
    <polygon points="26,14 30,6 34,12 40,2 46,12 50,6 54,14" fill="#FFD700" stroke="#222" stroke-width="2"/>
  </g>

  <!-- Character 3 - Green (Coder) -->
  <g transform="translate(250, 20)">
    <rect x="15" y="70" width="50" height="40" rx="10" fill="#22C55E" stroke="#222" stroke-width="3"/>
    <circle cx="40" cy="48" r="28" fill="#FFE0B2" stroke="#222" stroke-width="3"/>
    <path d="M14 46 Q14 22 40 20 Q66 22 66 46" fill="#8B5CF6" stroke="#222" stroke-width="2.5"/>
    <circle cx="40" cy="22" r="6" fill="#FF4D00" stroke="#222" stroke-width="2"/>
    <ellipse cx="30" cy="50" rx="4.5" ry="5" fill="#222"/>
    <ellipse cx="50" cy="50" rx="4.5" ry="5" fill="#222"/>
    <circle cx="29" cy="48" r="2" fill="#FFF"/>
    <circle cx="49" cy="48" r="2" fill="#FFF"/>
    <path d="M35 63 Q40 66 45 63" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
