<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- LEGO Block House -->
  <!-- Sky -->
  <rect x="0" y="0" width="200" height="200" fill="#E8F4FD" rx="0"/>
  
  <!-- Sun -->
  <circle cx="170" cy="30" r="18" fill="#FFD700" stroke="#333" stroke-width="2"/>
  
  <!-- Cloud -->
  <ellipse cx="45" cy="28" rx="20" ry="10" fill="white" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="60" cy="25" rx="15" ry="9" fill="white" stroke="#333" stroke-width="1.5"/>
  
  <!-- Roof (triangle) -->
  <polygon points="100,40 40,85 160,85" fill="#C0392B" stroke="#333" stroke-width="3"/>
  <!-- Roof studs -->
  <circle cx="80" cy="70" r="5" fill="#E74C3C" stroke="#333" stroke-width="1.5"/>
  <circle cx="100" cy="62" r="5" fill="#E74C3C" stroke="#333" stroke-width="1.5"/>
  <circle cx="120" cy="70" r="5" fill="#E74C3C" stroke="#333" stroke-width="1.5"/>
  
  <!-- House body - LEGO bricks -->
  <!-- Row 1 -->
  <rect x="50" y="85" width="50" height="25" rx="2" fill="#8DC63F" stroke="#333" stroke-width="2.5"/>
  <rect x="100" y="85" width="50" height="25" rx="2" fill="#8DC63F" stroke="#333" stroke-width="2.5"/>
  <!-- Studs row 1 -->
  <circle cx="65" cy="92" r="4" fill="#9ACD32" stroke="#333" stroke-width="1"/>
  <circle cx="85" cy="92" r="4" fill="#9ACD32" stroke="#333" stroke-width="1"/>
  <circle cx="115" cy="92" r="4" fill="#9ACD32" stroke="#333" stroke-width="1"/>
  <circle cx="135" cy="92" r="4" fill="#9ACD32" stroke="#333" stroke-width="1"/>
  
  <!-- Row 2 -->
  <rect x="50" y="110" width="35" height="25" rx="2" fill="#1B3054" stroke="#333" stroke-width="2.5"/>
  <rect x="85" y="110" width="30" height="25" rx="2" fill="#1B3054" stroke="#333" stroke-width="2.5"/>
  <rect x="115" y="110" width="35" height="25" rx="2" fill="#1B3054" stroke="#333" stroke-width="2.5"/>
  <!-- Studs row 2 -->
  <circle cx="67" cy="117" r="4" fill="#2C4A7C" stroke="#333" stroke-width="1"/>
  <circle cx="100" cy="117" r="4" fill="#2C4A7C" stroke="#333" stroke-width="1"/>
  <circle cx="133" cy="117" r="4" fill="#2C4A7C" stroke="#333" stroke-width="1"/>
  
  <!-- Row 3 -->
  <rect x="50" y="135" width="50" height="25" rx="2" fill="#4A7C59" stroke="#333" stroke-width="2.5"/>
  <rect x="100" y="135" width="50" height="25" rx="2" fill="#4A7C59" stroke="#333" stroke-width="2.5"/>
  
  <!-- Door -->
  <rect x="85" y="138" width="30" height="22" rx="3" fill="#8B4513" stroke="#333" stroke-width="2"/>
  <circle cx="108" cy="150" r="2.5" fill="#FFD700" stroke="#333" stroke-width="1"/>
  
  <!-- Window left -->
  <rect x="55" y="115" width="18" height="15" rx="2" fill="#87CEEB" stroke="#333" stroke-width="2"/>
  <line x1="64" y1="115" x2="64" y2="130" stroke="#333" stroke-width="1.5"/>
  <line x1="55" y1="122.5" x2="73" y2="122.5" stroke="#333" stroke-width="1.5"/>
  
  <!-- Window right -->
  <rect x="127" y="115" width="18" height="15" rx="2" fill="#87CEEB" stroke="#333" stroke-width="2"/>
  <line x1="136" y1="115" x2="136" y2="130" stroke="#333" stroke-width="1.5"/>
  <line x1="127" y1="122.5" x2="145" y2="122.5" stroke="#333" stroke-width="1.5"/>
  
  <!-- Ground -->
  <rect x="0" y="160" width="200" height="40" fill="#8DC63F" stroke="#333" stroke-width="2"/>
  <!-- Ground studs -->
  <circle cx="20" cy="170" r="5" fill="#9ACD32" stroke="#333" stroke-width="1"/>
  <circle cx="60" cy="170" r="5" fill="#9ACD32" stroke="#333" stroke-width="1"/>
  <circle cx="100" cy="170" r="5" fill="#9ACD32" stroke="#333" stroke-width="1"/>
  <circle cx="140" cy="170" r="5" fill="#9ACD32" stroke="#333" stroke-width="1"/>
  <circle cx="180" cy="170" r="5" fill="#9ACD32" stroke="#333" stroke-width="1"/>
</svg>