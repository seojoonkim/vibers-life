<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260">
  <!-- Hacker House building - Crazy Arcade style -->

  <!-- Ground -->
  <rect x="0" y="220" width="320" height="40" rx="4" fill="#4ADE80" stroke="#222" stroke-width="3"/>

  <!-- Building body -->
  <rect x="50" y="80" width="220" height="142" rx="6" fill="#FFF7ED" stroke="#222" stroke-width="3.5"/>

  <!-- Roof -->
  <polygon points="40,82 160,20 280,82" fill="#FF4D00" stroke="#222" stroke-width="3.5"/>
  <rect x="140" y="30" width="40" height="20" rx="4" fill="#666" stroke="#222" stroke-width="2.5"/>
  <!-- Antenna -->
  <line x1="160" y1="18" x2="160" y2="30" stroke="#222" stroke-width="2.5"/>
  <circle cx="160" cy="14" r="5" fill="#FF4D00" stroke="#222" stroke-width="2"/>

  <!-- Windows row 1 -->
  <rect x="70" y="96" width="36" height="30" rx="4" fill="#60A5FA" stroke="#222" stroke-width="2.5"/>
  <line x1="88" y1="96" x2="88" y2="126" stroke="#222" stroke-width="2"/>
  <line x1="70" y1="111" x2="106" y2="111" stroke="#222" stroke-width="2"/>

  <rect x="142" y="96" width="36" height="30" rx="4" fill="#60A5FA" stroke="#222" stroke-width="2.5"/>
  <line x1="160" y1="96" x2="160" y2="126" stroke="#222" stroke-width="2"/>
  <line x1="142" y1="111" x2="178" y2="111" stroke="#222" stroke-width="2"/>

  <rect x="214" y="96" width="36" height="30" rx="4" fill="#60A5FA" stroke="#222" stroke-width="2.5"/>
  <line x1="232" y1="96" x2="232" y2="126" stroke="#222" stroke-width="2"/>
  <line x1="214" y1="111" x2="250" y2="111" stroke="#222" stroke-width="2"/>

  <!-- Windows row 2 with code screens -->
  <rect x="70" y="142" width="36" height="30" rx="4" fill="#1A1A2E" stroke="#222" stroke-width="2.5"/>
  <rect x="74" y="146" width="16" height="3" rx="1" fill="#4ADE80"/>
  <rect x="74" y="152" width="24" height="3" rx="1" fill="#60A5FA"/>
  <rect x="74" y="158" width="12" height="3" rx="1" fill="#FBBF24"/>

  <rect x="214" y="142" width="36" height="30" rx="4" fill="#1A1A2E" stroke="#222" stroke-width="2.5"/>
  <rect x="218" y="146" width="20" height="3" rx="1" fill="#FF6B6B"/>
  <rect x="218" y="152" width="28" height="3" rx="1" fill="#4ADE80"/>
  <rect x="218" y="158" width="14" height="3" rx="1" fill="#60A5FA"/>

  <!-- Door -->
  <rect x="132" y="160" width="56" height="62" rx="6" fill="#FF4D00" stroke="#222" stroke-width="3"/>
  <circle cx="176" cy="192" r="4" fill="#FFD700" stroke="#222" stroke-width="2"/>

  <!-- Sign -->
  <rect x="110" y="140" width="100" height="18" rx="4" fill="#FFD700" stroke="#222" stroke-width="2"/>
  <text x="160" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="900" fill="#222">VIBERS HOUSE</text>

  <!-- Bushes -->
  <ellipse cx="42" cy="218" rx="22" ry="14" fill="#22C55E" stroke="#222" stroke-width="2.5"/>
  <ellipse cx="278" cy="218" rx="22" ry="14" fill="#22C55E" stroke="#222" stroke-width="2.5"/>

  <!-- Stars -->
  <polygon points="30,40 32,46 38,46 33,50 35,56 30,52 25,56 27,50 22,46 28,46" fill="#FFD700" stroke="#222" stroke-width="1.5"/>
  <polygon points="290,35 292,40 297,40 293,43 294,48 290,45 286,48 287,43 283,40 288,40" fill="#FFD700" stroke="#222" stroke-width="1.5"/>

  <!-- Cloud -->
  <ellipse cx="260" cy="50" rx="24" ry="12" fill="#FFF" stroke="#222" stroke-width="2"/>
  <ellipse cx="245" cy="48" rx="16" ry="10" fill="#FFF" stroke="#222" stroke-width="2"/>
  <ellipse cx="275" cy="48" rx="16" ry="10" fill="#FFF" stroke="#222" stroke-width="2"/>
  <rect x="240" y="48" width="36" height="10" fill="#FFF"/>
</svg>