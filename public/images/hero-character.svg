<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Developer character with laptop - Crazy Arcade style -->
  <!-- Body -->
  <rect x="60" y="100" width="80" height="60" rx="12" fill="#4A90FF" stroke="#222" stroke-width="3.5"/>
  <!-- Head -->
  <circle cx="100" cy="72" r="38" fill="#FFE0B2" stroke="#222" stroke-width="3.5"/>
  <!-- Hair -->
  <path d="M62 65 Q62 35 100 32 Q138 35 138 65 L138 55 Q138 30 100 26 Q62 30 62 55Z" fill="#5D4037" stroke="#222" stroke-width="3"/>
  <!-- Eyes -->
  <ellipse cx="85" cy="72" rx="6" ry="7" fill="#222"/>
  <ellipse cx="115" cy="72" rx="6" ry="7" fill="#222"/>
  <!-- Eye shine -->
  <circle cx="83" cy="69" r="2.5" fill="#FFF"/>
  <circle cx="113" cy="69" r="2.5" fill="#FFF"/>
  <!-- Mouth - happy -->
  <path d="M90 86 Q100 94 110 86" fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="74" cy="82" rx="7" ry="4" fill="#FFB4B4" opacity="0.6"/>
  <ellipse cx="126" cy="82" rx="7" ry="4" fill="#FFB4B4" opacity="0.6"/>
  <!-- Arms -->
  <rect x="40" y="110" width="22" height="14" rx="7" fill="#FFE0B2" stroke="#222" stroke-width="3"/>
  <rect x="138" y="110" width="22" height="14" rx="7" fill="#FFE0B2" stroke="#222" stroke-width="3"/>
  <!-- Laptop -->
  <rect x="52" y="140" width="96" height="10" rx="3" fill="#333" stroke="#222" stroke-width="2.5"/>
  <rect x="60" y="118" width="80" height="24" rx="3" fill="#1A1A2E" stroke="#222" stroke-width="2.5"/>
  <!-- Screen content -->
  <rect x="66" y="122" width="28" height="3" rx="1" fill="#4ADE80"/>
  <rect x="66" y="128" width="40" height="3" rx="1" fill="#60A5FA"/>
  <rect x="66" y="134" width="20" height="3" rx="1" fill="#FBBF24"/>
  <!-- Legs -->
  <rect x="72" y="158" width="20" height="30" rx="8" fill="#333" stroke="#222" stroke-width="3"/>
  <rect x="108" y="158" width="20" height="30" rx="8" fill="#333" stroke="#222" stroke-width="3"/>
  <!-- Shoes -->
  <rect x="68" y="184" width="28" height="14" rx="7" fill="#FF4D00" stroke="#222" stroke-width="3"/>
  <rect x="104" y="184" width="28" height="14" rx="7" fill="#FF4D00" stroke="#222" stroke-width="3"/>
  <!-- Star sparkle -->
  <polygon points="165,40 168,48 176,48 170,53 172,61 165,56 158,61 160,53 154,48 162,48" fill="#FFD700" stroke="#222" stroke-width="1.5"/>
  <polygon points="42,45 44,50 49,50 45,53 46,58 42,55 38,58 39,53 35,50 40,50" fill="#FFD700" stroke="#222" stroke-width="1.5"/>
</svg>