<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- LEGO Character Riding a Rocket -->
  
  <!-- Stars background -->
  <circle cx="20" cy="20" r="2" fill="#FFD700"/>
  <circle cx="180" cy="15" r="2" fill="#FFD700"/>
  <circle cx="40" cy="60" r="1.5" fill="#FFD700"/>
  <circle cx="170" cy="80" r="1.5" fill="#FFD700"/>
  <circle cx="15" cy="120" r="2" fill="#FFD700"/>
  <circle cx="185" cy="140" r="1.5" fill="#FFD700"/>
  
  <!-- Rocket body -->
  <rect x="75" y="60" width="50" height="90" rx="8" fill="#1B3054" stroke="#333" stroke-width="3"/>
  <!-- Rocket nose -->
  <polygon points="100,30 75,60 125,60" fill="#C0392B" stroke="#333" stroke-width="2.5"/>
  <!-- Rocket window -->
  <circle cx="100" cy="85" r="12" fill="#87CEEB" stroke="#333" stroke-width="2"/>
  <circle cx="100" cy="85" r="7" fill="#B0E0E6" stroke="#333" stroke-width="1"/>
  <!-- Rocket stripe -->
  <rect x="75" y="115" width="50" height="8" rx="0" fill="#8DC63F" stroke="#333" stroke-width="1.5"/>
  <!-- Rocket fins -->
  <polygon points="75,130 55,155 75,150" fill="#C0392B" stroke="#333" stroke-width="2"/>
  <polygon points="125,130 145,155 125,150" fill="#C0392B" stroke="#333" stroke-width="2"/>
  <!-- Rocket flames -->
  <polygon points="85,150 90,175 100,160 110,175 115,150" fill="#FF6B35" stroke="#FF4500" stroke-width="1"/>
  <polygon points="90,150 95,168 100,155 105,168 110,150" fill="#FFD700" stroke="none"/>
  
  <!-- LEGO Character riding on top -->
  <!-- Head bump -->
  <rect x="44" y="15" width="12" height="7" rx="2" fill="#FFD700" stroke="#333" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="50" cy="38" r="18" fill="#FFD700" stroke="#333" stroke-width="3"/>
  <!-- Eyes (excited!) -->
  <circle cx="44" cy="35" r="3" fill="#333"/>
  <circle cx="56" cy="35" r="3" fill="#333"/>
  <!-- Excited open mouth -->
  <ellipse cx="50" cy="46" rx="6" ry="4" fill="#333" stroke="#333" stroke-width="1"/>
  <!-- Body -->
  <rect x="36" y="58" width="28" height="30" rx="3" fill="#8DC63F" stroke="#333" stroke-width="2.5"/>
  <!-- Arm holding rocket -->
  <rect x="64" y="62" width="14" height="8" rx="3" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <!-- Other arm (waving) -->
  <rect x="22" y="55" width="14" height="8" rx="3" fill="#FFD700" stroke="#333" stroke-width="2" transform="rotate(-30 29 59)"/>
  <!-- Legs -->
  <rect x="38" y="88" width="11" height="14" rx="2" fill="#1B3054" stroke="#333" stroke-width="2"/>
  <rect x="51" y="88" width="11" height="14" rx="2" fill="#1B3054" stroke="#333" stroke-width="2"/>
  
  <!-- Speed lines -->
  <line x1="30" y1="170" x2="50" y2="185" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="178" x2="100" y2="195" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
  <line x1="155" y1="170" x2="150" y2="188" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
</svg>