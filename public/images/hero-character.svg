<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- LEGO Developer with Laptop -->
  <!-- Head bump -->
  <rect x="90" y="25" width="20" height="10" rx="3" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <!-- Head -->
  <circle cx="100" cy="60" r="30" fill="#FFD700" stroke="#333" stroke-width="3"/>
  <!-- Eyes -->
  <circle cx="90" cy="55" r="4" fill="#333"/>
  <circle cx="110" cy="55" r="4" fill="#333"/>
  <!-- Smile -->
  <path d="M 90 68 Q 100 78 110 68" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Body (Green shirt) -->
  <rect x="72" y="93" width="56" height="50" rx="5" fill="#8DC63F" stroke="#333" stroke-width="3"/>
  <!-- Arms -->
  <rect x="52" y="95" width="20" height="12" rx="4" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <rect x="128" y="95" width="20" height="12" rx="4" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <!-- Hands holding laptop -->
  <rect x="48" y="107" width="12" height="10" rx="3" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <rect x="140" y="107" width="12" height="10" rx="3" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <!-- Laptop -->
  <rect x="50" y="115" width="100" height="8" rx="2" fill="#1B3054" stroke="#333" stroke-width="2"/>
  <rect x="55" y="108" width="90" height="7" rx="1" fill="#4A90D9" stroke="#333" stroke-width="1.5"/>
  <!-- Code lines on laptop -->
  <line x1="60" y1="110" x2="75" y2="110" stroke="#8DC63F" stroke-width="1"/>
  <line x1="78" y1="110" x2="90" y2="110" stroke="#FFD700" stroke-width="1"/>
  <line x1="60" y1="113" x2="68" y2="113" stroke="#fff" stroke-width="1"/>
  <!-- Legs -->
  <rect x="77" y="143" width="18" height="22" rx="3" fill="#1B3054" stroke="#333" stroke-width="2"/>
  <rect x="105" y="143" width="18" height="22" rx="3" fill="#1B3054" stroke="#333" stroke-width="2"/>
  <!-- Feet -->
  <rect x="74" y="163" width="24" height="8" rx="3" fill="#333" stroke="#333" stroke-width="1"/>
  <rect x="102" y="163" width="24" height="8" rx="3" fill="#333" stroke="#333" stroke-width="1"/>
</svg>