<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- Rocket character - Crazy Arcade style -->

  <!-- Exhaust flames -->
  <ellipse cx="120" cy="210" rx="20" ry="16" fill="#FBBF24" stroke="#222" stroke-width="2" opacity="0.8"/>
  <ellipse cx="120" cy="218" rx="14" ry="12" fill="#FF4D00" stroke="#222" stroke-width="2" opacity="0.7"/>
  <ellipse cx="120" cy="224" rx="8" ry="8" fill="#FF6B6B" opacity="0.6"/>

  <!-- Rocket body -->
  <path d="M90 100 Q90 50 120 30 Q150 50 150 100 L150 180 Q150 195 120 195 Q90 195 90 180 Z" fill="#FFF" stroke="#222" stroke-width="3.5"/>

  <!-- Nose cone -->
  <path d="M100 80 Q100 50 120 35 Q140 50 140 80" fill="#FF4D00" stroke="#222" stroke-width="3"/>

  <!-- Window / Face area -->
  <circle cx="120" cy="115" r="26" fill="#60A5FA" stroke="#222" stroke-width="3"/>
  <circle cx="120" cy="115" r="20" fill="#E0F2FE" stroke="#222" stroke-width="2"/>

  <!-- Cute face -->
  <ellipse cx="112" cy="112" rx="4" ry="5" fill="#222"/>
  <ellipse cx="128" cy="112" rx="4" ry="5" fill="#222"/>
  <circle cx="111" cy="110" r="2" fill="#FFF"/>
  <circle cx="127" cy="110" r="2" fill="#FFF"/>
  <path d="M115 122 Q120 128 125 122" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="102" cy="118" rx="5" ry="3" fill="#FFB4B4" opacity="0.6"/>
  <ellipse cx="138" cy="118" rx="5" ry="3" fill="#FFB4B4" opacity="0.6"/>

  <!-- Side fins -->
  <path d="M90 150 L65 180 L90 175" fill="#FF4D00" stroke="#222" stroke-width="3"/>
  <path d="M150 150 L175 180 L150 175" fill="#FF4D00" stroke="#222" stroke-width="3"/>

  <!-- Body stripes -->
  <rect x="96" y="155" width="48" height="6" rx="3" fill="#FF4D00" stroke="#222" stroke-width="2"/>
  <rect x="96" y="168" width="48" height="6" rx="3" fill="#FFD700" stroke="#222" stroke-width="2"/>

  <!-- Stars around -->
  <polygon points="40,60 43,68 51,68 45,73 47,81 40,76 33,81 35,73 29,68 37,68" fill="#FFD700" stroke="#222" stroke-width="1.5"/>
  <polygon points="195,50 197,56 203,56 198,59 200,65 195,62 190,65 192,59 187,56 193,56" fill="#FFD700" stroke="#222" stroke-width="1.5"/>
  <polygon points="55,140 57,145 62,145 58,148 59,153 55,150 51,153 52,148 48,145 53,145" fill="#4A90FF" stroke="#222" stroke-width="1"/>
  <circle cx="185" cy="130" r="4" fill="#22C55E" stroke="#222" stroke-width="1.5"/>
  <circle cx="45" cy="100" r="3" fill="#FF4D00" stroke="#222" stroke-width="1"/>
  <circle cx="200" cy="90" r="3.5" fill="#FBBF24" stroke="#222" stroke-width="1"/>
</svg>