<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Two LEGO Characters - Hashed x NEXON -->
  
  <!-- Character 1 (Hashed - Navy) -->
  <!-- Head bump -->
  <rect x="43" y="30" width="14" height="8" rx="2" fill="#FFD700" stroke="#333" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="50" cy="58" r="22" fill="#FFD700" stroke="#333" stroke-width="3"/>
  <!-- Eyes -->
  <circle cx="43" cy="54" r="3" fill="#333"/>
  <circle cx="57" cy="54" r="3" fill="#333"/>
  <!-- Smile -->
  <path d="M 43 65 Q 50 73 57 65" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Body (Navy - Hashed) -->
  <rect x="30" y="83" width="40" height="42" rx="4" fill="#1B3054" stroke="#333" stroke-width="3"/>
  <!-- H logo on body -->
  <text x="50" y="110" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFD700" font-family="Arial">H</text>
  <!-- Left arm -->
  <rect x="16" y="85" width="14" height="10" rx="3" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <!-- Right arm (handshake) -->
  <rect x="70" y="90" width="14" height="10" rx="3" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <!-- Legs -->
  <rect x="34" y="125" width="14" height="18" rx="2" fill="#1B3054" stroke="#333" stroke-width="2"/>
  <rect x="52" y="125" width="14" height="18" rx="2" fill="#1B3054" stroke="#333" stroke-width="2"/>
  <!-- Feet -->
  <rect x="32" y="141" width="18" height="6" rx="2" fill="#333"/>
  <rect x="50" y="141" width="18" height="6" rx="2" fill="#333"/>

  <!-- Handshake -->
  <rect x="84" y="90" width="32" height="12" rx="4" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <!-- Handshake sparkle -->
  <text x="100" y="86" text-anchor="middle" font-size="12" fill="#FFD700">⚡</text>

  <!-- Character 2 (NEXON - Green) -->
  <!-- Head bump -->
  <rect x="143" y="30" width="14" height="8" rx="2" fill="#FFD700" stroke="#333" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="150" cy="58" r="22" fill="#FFD700" stroke="#333" stroke-width="3"/>
  <!-- Eyes -->
  <circle cx="143" cy="54" r="3" fill="#333"/>
  <circle cx="157" cy="54" r="3" fill="#333"/>
  <!-- Smile -->
  <path d="M 143 65 Q 150 73 157 65" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Body (Green - NEXON) -->
  <rect x="130" y="83" width="40" height="42" rx="4" fill="#8DC63F" stroke="#333" stroke-width="3"/>
  <!-- N logo on body -->
  <text x="150" y="110" text-anchor="middle" font-size="18" font-weight="bold" fill="#1B3054" font-family="Arial">N</text>
  <!-- Left arm (handshake) -->
  <rect x="116" y="90" width="14" height="10" rx="3" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <!-- Right arm -->
  <rect x="170" y="85" width="14" height="10" rx="3" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <!-- Legs -->
  <rect x="134" y="125" width="14" height="18" rx="2" fill="#1B3054" stroke="#333" stroke-width="2"/>
  <rect x="152" y="125" width="14" height="18" rx="2" fill="#1B3054" stroke="#333" stroke-width="2"/>
  <!-- Feet -->
  <rect x="132" y="141" width="18" height="6" rx="2" fill="#333"/>
  <rect x="150" y="141" width="18" height="6" rx="2" fill="#333"/>
  
  <!-- Labels -->
  <text x="50" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B3054" font-family="Arial">Hashed</text>
  <text x="100" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#333" font-family="Arial">×</text>
  <text x="150" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="#8DC63F" font-family="Arial">NEXON</text>
</svg>