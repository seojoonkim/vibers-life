<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <!-- NEXON x Hashed partner icon - Crazy Arcade style -->

  <!-- Left shield - Hashed -->
  <g transform="translate(30, 10)">
    <path d="M10 20 L60 5 L110 20 L110 100 Q60 130 10 100 Z" fill="#4A90FF" stroke="#222" stroke-width="3.5"/>
    <path d="M22 28 L60 16 L98 28 L98 94 Q60 118 22 94 Z" fill="#E0F2FE" stroke="#222" stroke-width="2"/>
    <!-- H letter -->
    <rect x="40" y="40" width="8" height="48" rx="2" fill="#4A90FF" stroke="#222" stroke-width="2"/>
    <rect x="72" y="40" width="8" height="48" rx="2" fill="#4A90FF" stroke="#222" stroke-width="2"/>
    <rect x="40" y="58" width="40" height="8" rx="2" fill="#4A90FF" stroke="#222" stroke-width="2"/>
    <!-- Cute eyes on shield -->
    <ellipse cx="48" cy="100" rx="3" ry="3.5" fill="#222"/>
    <ellipse cx="72" cy="100" rx="3" ry="3.5" fill="#222"/>
    <circle cx="47" cy="99" r="1.5" fill="#FFF"/>
    <circle cx="71" cy="99" r="1.5" fill="#FFF"/>
    <path d="M55 108 Q60 112 65 108" fill="none" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- X connector -->
  <g transform="translate(148, 55)">
    <text x="12" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#FF4D00" stroke="#222" stroke-width="1">×</text>
    <!-- Sparkles around X -->
    <circle cx="-5" cy="10" r="3" fill="#FFD700" stroke="#222" stroke-width="1"/>
    <circle cx="28" cy="40" r="2.5" fill="#22C55E" stroke="#222" stroke-width="1"/>
  </g>

  <!-- Right shield - NEXON -->
  <g transform="translate(180, 10)">
    <path d="M10 20 L60 5 L110 20 L110 100 Q60 130 10 100 Z" fill="#22C55E" stroke="#222" stroke-width="3.5"/>
    <path d="M22 28 L60 16 L98 28 L98 94 Q60 118 22 94 Z" fill="#F0FFF4" stroke="#222" stroke-width="2"/>
    <!-- N letter -->
    <rect x="38" y="40" width="8" height="48" rx="2" fill="#22C55E" stroke="#222" stroke-width="2"/>
    <rect x="74" y="40" width="8" height="48" rx="2" fill="#22C55E" stroke="#222" stroke-width="2"/>
    <path d="M46 44 L74 80" stroke="#22C55E" stroke-width="8" stroke-linecap="round"/>
    <path d="M46 44 L74 80" stroke="#222" stroke-width="2" stroke-linecap="round"/>
    <!-- Cute eyes on shield -->
    <ellipse cx="48" cy="100" rx="3" ry="3.5" fill="#222"/>
    <ellipse cx="72" cy="100" rx="3" ry="3.5" fill="#222"/>
    <circle cx="47" cy="99" r="1.5" fill="#FFF"/>
    <circle cx="71" cy="99" r="1.5" fill="#FFF"/>
    <path d="M55 108 Q60 112 65 108" fill="none" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Top sparkles -->
  <polygon points="160,8 162,14 168,14 163,18 165,24 160,20 155,24 157,18 152,14 158,14" fill="#FFD700" stroke="#222" stroke-width="1.5"/>
</svg>