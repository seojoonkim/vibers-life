<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="300" height="200">
  <!-- LEGO Builder Group - 3 characters -->
  
  <!-- Character 1 (Navy) -->
  <rect x="55" y="30" width="14" height="8" rx="2" fill="#FFD700" stroke="#333" stroke-width="1.5"/>
  <circle cx="62" cy="58" r="22" fill="#FFD700" stroke="#333" stroke-width="3"/>
  <circle cx="55" cy="54" r="3" fill="#333"/>
  <circle cx="69" cy="54" r="3" fill="#333"/>
  <path d="M 55 65 Q 62 73 69 65" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="42" y="83" width="40" height="40" rx="4" fill="#1B3054" stroke="#333" stroke-width="3"/>
  <!-- Arms -->
  <rect x="28" y="85" width="14" height="10" rx="3" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <rect x="82" y="85" width="14" height="10" rx="3" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <!-- Wrench -->
  <rect x="22" y="88" width="8" height="3" rx="1" fill="#999" stroke="#333" stroke-width="1"/>
  <!-- Legs -->
  <rect x="46" y="123" width="14" height="18" rx="2" fill="#1B3054" stroke="#333" stroke-width="2"/>
  <rect x="64" y="123" width="14" height="18" rx="2" fill="#1B3054" stroke="#333" stroke-width="2"/>
  <rect x="44" y="139" width="18" height="6" rx="2" fill="#333"/>
  <rect x="62" y="139" width="18" height="6" rx="2" fill="#333"/>

  <!-- Character 2 (Green, center, slightly taller) -->
  <rect x="143" y="25" width="14" height="8" rx="2" fill="#FFD700" stroke="#333" stroke-width="1.5"/>
  <circle cx="150" cy="53" r="24" fill="#FFD700" stroke="#333" stroke-width="3"/>
  <circle cx="142" cy="49" r="3.5" fill="#333"/>
  <circle cx="158" cy="49" r="3.5" fill="#333"/>
  <path d="M 142 61 Q 150 70 158 61" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <rect x="128" y="80" width="44" height="44" rx="4" fill="#8DC63F" stroke="#333" stroke-width="3"/>
  <!-- Arms -->
  <rect x="112" y="82" width="16" height="11" rx="3" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <rect x="172" y="82" width="16" height="11" rx="3" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <!-- Star badge -->
  <polygon points="150,86 153,92 160,93 155,97 156,104 150,100 144,104 145,97 140,93 147,92" fill="#FFD700" stroke="#333" stroke-width="1"/>
  <!-- Legs -->
  <rect x="133" y="124" width="15" height="20" rx="2" fill="#1B3054" stroke="#333" stroke-width="2"/>
  <rect x="152" y="124" width="15" height="20" rx="2" fill="#1B3054" stroke="#333" stroke-width="2"/>
  <rect x="131" y="142" width="19" height="6" rx="2" fill="#333"/>
  <rect x="150" y="142" width="19" height="6" rx="2" fill="#333"/>

  <!-- Character 3 (Teal) -->
  <rect x="231" y="30" width="14" height="8" rx="2" fill="#FFD700" stroke="#333" stroke-width="1.5"/>
  <circle cx="238" cy="58" r="22" fill="#FFD700" stroke="#333" stroke-width="3"/>
  <circle cx="231" cy="54" r="3" fill="#333"/>
  <circle cx="245" cy="54" r="3" fill="#333"/>
  <path d="M 231 65 Q 238 73 245 65" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <rect x="218" y="83" width="40" height="40" rx="4" fill="#4A7C59" stroke="#333" stroke-width="3"/>
  <!-- Arms -->
  <rect x="204" y="85" width="14" height="10" rx="3" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <rect x="258" y="85" width="14" height="10" rx="3" fill="#FFD700" stroke="#333" stroke-width="2"/>
  <!-- Hammer -->
  <rect x="266" y="83" width="3" height="14" rx="1" fill="#8B4513" stroke="#333" stroke-width="1"/>
  <rect x="262" y="81" width="11" height="5" rx="1" fill="#999" stroke="#333" stroke-width="1"/>
  <!-- Legs -->
  <rect x="222" y="123" width="14" height="18" rx="2" fill="#1B3054" stroke="#333" stroke-width="2"/>
  <rect x="240" y="123" width="14" height="18" rx="2" fill="#1B3054" stroke="#333" stroke-width="2"/>
  <rect x="220" y="139" width="18" height="6" rx="2" fill="#333"/>
  <rect x="238" y="139" width="18" height="6" rx="2" fill="#333"/>

  <!-- Ground line -->
  <line x1="10" y1="148" x2="290" y2="148" stroke="#333" stroke-width="2" stroke-dasharray="5,5"/>
