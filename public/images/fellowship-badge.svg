<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 220" width="180" height="220">
  <!-- Fellowship badge/trophy - Crazy Arcade style -->

  <!-- Ribbon tails -->
  <path d="M50 160 L30 210 L55 190 L70 210 L70 160" fill="#FF4D00" stroke="#222" stroke-width="3"/>
  <path d="M110 160 L110 210 L125 190 L150 210 L130 160" fill="#FF4D00" stroke="#222" stroke-width="3"/>

  <!-- Shield body -->
  <path d="M30 50 L30 130 Q30 170 90 185 Q150 170 150 130 L150 50 Z" fill="#FFD700" stroke="#222" stroke-width="3.5"/>

  <!-- Inner shield -->
  <path d="M44 60 L44 126 Q44 158 90 172 Q136 158 136 126 L136 60 Z" fill="#FFF7ED" stroke="#222" stroke-width="2.5"/>

  <!-- Top decoration -->
  <rect x="60" y="35" width="60" height="20" rx="10" fill="#FF4D00" stroke="#222" stroke-width="3"/>
  <text x="90" y="49" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="900" fill="#FFF">VIBERS</text>

  <!-- Star in center -->
  <polygon points="90,75 97,95 118,95 101,108 108,128 90,115 72,128 79,108 62,95 83,95" fill="#FFD700" stroke="#222" stroke-width="2.5"/>

  <!-- Inner star -->
  <polygon points="90,82 94,94 106,94 96,102 100,114 90,107 80,114 84,102 74,94 86,94" fill="#FF4D00"/>

  <!-- Cute face on star -->
  <ellipse cx="84" cy="98" rx="2.5" ry="3" fill="#222"/>
  <ellipse cx="96" cy="98" rx="2.5" ry="3" fill="#222"/>
  <circle cx="83" cy="97" r="1.2" fill="#FFF"/>
  <circle cx="95" cy="97" r="1.2" fill="#FFF"/>
  <path d="M87 104 Q90 107 93 104" fill="none" stroke="#222" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Text -->
  <text x="90" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="900" fill="#222">FELLOWSHIP</text>

  <!-- Corner sparkles -->
  <circle cx="30" cy="40" r="4" fill="#FF4D00" stroke="#222" stroke-width="1.5"/>
  <circle cx="150" cy="40" r="4" fill="#4A90FF" stroke="#222" stroke-width="1.5"/>
  <circle cx="20" cy="60" r="3" fill="#FFD700" stroke="#222" stroke-width="1"/>
  <circle cx="160" cy="60" r="3" fill="#22C55E" stroke="#222" stroke-width="1"/>
</svg>