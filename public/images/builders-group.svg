    <rect x="16" y="128" width="24" height="12" rx="6" fill="#FF4D00" stroke="#222" stroke-width="2.5"/>
    <rect x="40" y="128" width="24" height="12" rx="6" fill="#FF4D00" stroke="#222" stroke-width="2.5"/>
  </g>

  <!-- Sparkles -->
  <circle cx="130" cy="30" r="4" fill="#FFD700" stroke="#222" stroke-width="1.5"/>
  <circle cx="240" cy="25" r="3" fill="#FF4D00" stroke="#222" stroke-width="1"/>
  <circle cx="320" cy="50" r="3.5" fill="#4A90FF" stroke="#222" stroke-width="1"/>
